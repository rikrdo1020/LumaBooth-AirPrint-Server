# CUPS configuration for LumaBooth AirPrint Server
LogLevel warn
MaxLogSize 0
ErrorLog /var/log/lumabooth/cups-error.log
AccessLog /var/log/lumabooth/cups-access.log
PageLog /dev/null

# Listen on all interfaces for IPP and on the Unix socket
Listen 0.0.0.0:631
Listen /run/cups/cups.sock

# Allow any hostname (container hostname changes on each run)
ServerAlias *

# Enable the web interface
WebInterface Yes

# No authentication required (local event network use only)
DefaultAuthType None

<Location />
  Order allow,deny
  Allow all
</Location>

<Location /admin>
  Order allow,deny
  Allow all
</Location>

<Location /admin/conf>
  Order allow,deny
  Allow all
</Location>

# We manage Avahi advertisement manually via the service file so that we can
# set the required URF= TXT record. Disabling CUPS's own browsing prevents a
# duplicate conflicting mDNS announcement.
Browsing Off
BrowseLocalProtocols none
